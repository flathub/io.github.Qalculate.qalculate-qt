app-id: io.github.Qalculate.qalculate-qt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: qalculate-qt
rename-icon: qalculate-qt
copy-icon: true
finish-args:
  - --device=dri
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # Network access
  # for exchange rates updates
  - --share=network
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.la'
modules:
  - name: gnuplot
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/gnuplot/gnuplot-6.0.4.tar.gz
        sha256: 458d94769625e73d5f6232500f49cbadcb2b183380d43d2266a0f9701aeb9c5b
        x-checker-data:
          type: anitya
          project-id: 1216
          url-template: https://downloads.sourceforge.net/gnuplot/gnuplot-$version.tar.gz

  - name: libqalculate
    sources:
      - type: archive
        url: https://github.com/Qalculate/libqalculate/releases/download/v5.12.0/libqalculate-5.12.0.tar.gz
        sha256: f3dfdcf97d5a9e3a5bc0ebe66afd184721b606276eee3ba0ada8c92a5e71d44c
        x-checker-data:
          type: anitya
          project-id: 230126
          url-template: https://github.com/Qalculate/libqalculate/releases/download/v$version/libqalculate-$version.tar.gz

  - name: qalculate-qt
    buildsystem: qmake
    sources:
      - type: archive
        url: https://github.com/Qalculate/qalculate-qt/releases/download/v5.12.0/qalculate-qt-5.12.0.tar.gz
        sha256: 8eee50aff8c266365d5e455e913133162ea96ae4ce5be5977c3d12fbeaf5d0e4
        x-checker-data:
          type: anitya
          project-id: 242905
          url-template: https://github.com/Qalculate/qalculate-qt/releases/download/v$version/qalculate-qt-$version.tar.gz
